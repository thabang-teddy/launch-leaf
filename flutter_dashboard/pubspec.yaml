name: flutter_dashboard
description: "LaunchLeaf portfolio manager - mobile and desktop companion app."
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.6.2

  # State management
  provider: ^6.1.2

  # HTTP client
  dio: ^5.7.0

  # Local storage
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.4+2

  # Preferences
  shared_preferences: ^2.3.3

  # Utils
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
